services:
  backend:
    container_name: krakhouse-backend
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"

  frontend:
    container_name: krakhouse-frontend
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"
