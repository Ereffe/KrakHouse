spring.application.name=Backend

logging.file.name=logs/air-quality.log
logging.level.root=WARN
logging.level.pk.backend=INFO

spring.datasource.url=jdbc:mysql://localhost:3306/rcn?useSSL=false&serverTimezone=UTC&rewriteBatchedStatements=true
spring.datasource.username=${DB_USERNAME:rcn}
spring.datasource.password=${DB_PASSWORD:rcn}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=${RCN_IMPORT_BATCH_SIZE:2000}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.show-sql=false

rcn.import.source-url=${RCN_SOURCE_URL:https://rzeczoznawca.eco.um.krakow.pl/RCN/1261_RCN.zip}
rcn.import.download-dir=${RCN_DOWNLOAD_DIR:./data/rcn/downloads}
rcn.import.temp-dir=${RCN_TEMP_DIR:./data/rcn/tmp}
rcn.import.retry-count=3
rcn.import.batch-size=${RCN_IMPORT_BATCH_SIZE:2000}
rcn.import.link-log-interval=${RCN_LINK_LOG_INTERVAL:10000}
rcn.import.cron=0 0 0 * * *
rcn.price.data-provider=${RCN_PRICE_DATA_PROVIDER:Rejestr Cen Nieruchomosci Miasta Krakowa}

# RestClient configuration
air-quality.api.base-url=https://api.gios.gov.pl/pjp-api
air-quality.api-provider=https://powietrze.gios.gov.pl
