services:
  mysql:
    image: mysql:8.4
    container_name: krakhouse-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} -e 'SELECT 1' $${MYSQL_DATABASE} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build: .
    container_name: krakhouse-backend
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&rewriteBatchedStatements=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RCN_DOWNLOAD_DIR: /data/rcn/downloads
      RCN_TEMP_DIR: /data/rcn/tmp
    ports:
      - "8080:8080"
    volumes:
      - ./data/rcn:/data/rcn
      - ./logs:/logs

volumes:
  mysql_data:
